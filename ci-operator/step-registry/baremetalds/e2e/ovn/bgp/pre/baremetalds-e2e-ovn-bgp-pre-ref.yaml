ref:
  as: baremetalds-e2e-ovn-bgp-pre
  from: src
  commands: baremetalds-e2e-ovn-bgp-pre-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
  grace_period: 10m
  env:
    - name: USE_UPSTREAM_FRR_IMAGE
      default: ""
      documentation: |-
        When set to "true", overrides FRR-K8s with an upstream FRR image (quay.io/frrouting/frr:10.4.1)
        needed to support EVPN while waiting for OCP builds with FRR 10.
  documentation: |-
    The Baremetald IPI setup chain contains all steps that enable FRR and route advertisements
